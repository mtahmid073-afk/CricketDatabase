<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Match Center</title>
</head>
<body>
  <h1>Match Center</h1>
  <p>The toss result has been saved.</p>

  <pre id="out"></pre>

  <script>
    document.getElementById("out").textContent = JSON.stringify({
      currentTourMatch: JSON.parse(localStorage.getItem("currentTourMatch")),
      currentTossResult: JSON.parse(localStorage.getItem("currentTossResult"))
    }, null, 2);
  </script>
</body>
</html>
